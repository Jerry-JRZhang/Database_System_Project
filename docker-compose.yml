services:
  postgres:
    image: postgres:16
    container_name: equitydb-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equity}
      POSTGRES_DB: ${POSTGRES_DB:-equitydb}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # PGDATA points to a SUBDIRECTORY of the bind mount so initdb has a
      # clean directory (Windows bind mounts often contain hidden metadata).
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Bind-mount onto D: so DB files don't fill up C:.
      # Override the host path with PGDATA_HOST_DIR in .env if you want.
      - ${PGDATA_HOST_DIR:-D:/equitydb-data/pgdata}:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equity} -d ${POSTGRES_DB:-equitydb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # TimescaleDB — M5 A/B comparison. Same major version (pg16) so the only
  # variable is the storage engine: hypertable chunks vs. manual RANGE partitions.
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: equitydb-ts
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equity}
      POSTGRES_DB: ${POSTGRES_DB:-equitydb}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "shared_preload_libraries=timescaledb,pg_stat_statements"
    ports:
      - "${TS_PORT:-5434}:5432"
    volumes:
      - ${TSDATA_HOST_DIR:-D:/equitydb-data/tspgdata}:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equity} -d ${POSTGRES_DB:-equitydb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Lightweight web UI (optional)
  adminer:
    image: adminer:4
    container_name: equitydb-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

